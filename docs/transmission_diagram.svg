<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="520" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Times New Roman, serif" font-size="16" font-weight="bold" fill="#2c3e50">Financial Transmission Mechanisms in a Partially Dollarized Commodity Exporter</text>
  
  <!-- SECTION 1: Dollar Balance Sheet Channel (Top) -->
  <rect x="20" y="50" width="760" height="95" rx="5" fill="#e8f4f8" stroke="#3498db" stroke-width="1.5"/>
  <text x="40" y="70" font-family="Times New Roman, serif" font-size="12" font-weight="bold" fill="#2980b9">Dollar Balance Sheet Channel</text>
  
  <!-- DXY Box -->
  <rect x="40" y="85" width="90" height="45" rx="4" fill="#3498db" stroke="#2980b9" stroke-width="1.5"/>
  <text x="85" y="105" text-anchor="middle" font-family="Times New Roman, serif" font-size="11" font-weight="bold" fill="white">DXY ↑</text>
  <text x="85" y="120" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" fill="white">(Dollar Strength)</text>
  
  <!-- Arrow 1 -->
  <line x1="130" y1="107" x2="165" y2="107" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Three channels box -->
  <rect x="170" y="80" width="200" height="55" rx="4" fill="#ffffff" stroke="#3498db" stroke-width="1"/>
  <text x="270" y="97" text-anchor="middle" font-family="Times New Roman, serif" font-size="10" fill="#2c3e50">• Collateral compression (↓NW)</text>
  <text x="270" y="112" text-anchor="middle" font-family="Times New Roman, serif" font-size="10" fill="#2c3e50">• Debt service burden (↑e·D*)</text>
  <text x="270" y="127" text-anchor="middle" font-family="Times New Roman, serif" font-size="10" fill="#2c3e50">• Import cost pass-through</text>
  
  <!-- Arrow 2 -->
  <line x1="370" y1="107" x2="405" y2="107" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- FCI Box -->
  <rect x="410" y="85" width="100" height="45" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <text x="460" y="105" text-anchor="middle" font-family="Times New Roman, serif" font-size="11" font-weight="bold" fill="white">FCI ↑</text>
  <text x="460" y="120" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" fill="white">(Tightening)</text>
  
  <!-- Arrow 3 -->
  <line x1="510" y1="107" x2="545" y2="107" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Credit Box -->
  <rect x="550" y="85" width="100" height="45" rx="4" fill="#9b59b6" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="600" y="105" text-anchor="middle" font-family="Times New Roman, serif" font-size="11" font-weight="bold" fill="white">Credit ↓</text>
  <text x="600" y="120" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" fill="white">(Contraction)</text>
  
  <!-- Key insight box -->
  <rect x="665" y="82" width="105" height="50" rx="3" fill="#fff9e6" stroke="#f39c12" stroke-width="1"/>
  <text x="717" y="98" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" font-style="italic" fill="#8B7000">Key insight:</text>
  <text x="717" y="111" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" font-weight="bold" fill="#8B7000">DXY >> VIX</text>
  <text x="717" y="124" text-anchor="middle" font-family="Times New Roman, serif" font-size="8" fill="#8B7000">for dollarized EMs</text>
  
  <!-- SECTION 2: Conditional Financial Accelerator (Middle) -->
  <rect x="20" y="155" width="760" height="130" rx="5" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5"/>
  <text x="40" y="175" font-family="Times New Roman, serif" font-size="12" font-weight="bold" fill="#d68910">Conditional Financial Accelerator</text>
  
  <!-- ToT High scenario -->
  <rect x="60" y="190" width="320" height="85" rx="4" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="220" y="210" text-anchor="middle" font-family="Times New Roman, serif" font-size="11" font-weight="bold" fill="#1e8449">When ToT is FAVORABLE (High Commodity Prices)</text>
  
  <rect x="80" y="220" width="80" height="35" rx="3" fill="#27ae60" stroke="#1e8449" stroke-width="1"/>
  <text x="120" y="235" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" fill="white">Commodity</text>
  <text x="120" y="247" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" fill="white">Buffer: HIGH</text>
  
  <text x="175" y="240" font-family="Times New Roman, serif" font-size="14" fill="#27ae60">→</text>
  
  <rect x="190" y="220" width="80" height="35" rx="3" fill="#82e0aa" stroke="#27ae60" stroke-width="1"/>
  <text x="230" y="235" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" fill="#1e8449">FCI Effect:</text>
  <text x="230" y="247" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" font-weight="bold" fill="#1e8449">AMPLIFIED</text>

  <text x="285" y="240" font-family="Times New Roman, serif" font-size="14" fill="#27ae60">→</text>

  <text x="340" y="240" text-anchor="middle" font-family="Times New Roman, serif" font-size="10" font-weight="bold" fill="#1e8449">−10.8 pp</text>
  
  <!-- ToT Low scenario -->
  <rect x="420" y="190" width="320" height="85" rx="4" fill="#fdedec" stroke="#c0392b" stroke-width="1.5"/>
  <text x="580" y="210" text-anchor="middle" font-family="Times New Roman, serif" font-size="11" font-weight="bold" fill="#922b21">When ToT is UNFAVORABLE (Low Commodity Prices)</text>
  
  <rect x="440" y="220" width="80" height="35" rx="3" fill="#c0392b" stroke="#922b21" stroke-width="1"/>
  <text x="480" y="235" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" fill="white">Commodity</text>
  <text x="480" y="247" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" fill="white">Buffer: LOW</text>
  
  <text x="535" y="240" font-family="Times New Roman, serif" font-size="14" fill="#c0392b">→</text>
  
  <rect x="550" y="220" width="80" height="35" rx="3" fill="#f1948a" stroke="#c0392b" stroke-width="1"/>
  <text x="590" y="235" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" fill="#922b21">FCI Effect:</text>
  <text x="590" y="247" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" font-weight="bold" fill="#922b21">MUTED</text>

  <text x="645" y="240" font-family="Times New Roman, serif" font-size="14" fill="#c0392b">→</text>

  <text x="700" y="240" text-anchor="middle" font-family="Times New Roman, serif" font-size="10" fill="#922b21">−3.7 pp</text>
  
  <!-- SECTION 3: Dual-Engine Economy (Bottom) -->
  <rect x="20" y="295" width="760" height="195" rx="5" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="40" y="315" font-family="Times New Roman, serif" font-size="12" font-weight="bold" fill="#6c3483">Dual-Engine Economy</text>
  
  <!-- Credit/FCI source -->
  <rect x="60" y="335" width="80" height="40" rx="4" fill="#e74c3c" stroke="#c0392b" stroke-width="1.5"/>
  <text x="100" y="352" text-anchor="middle" font-family="Times New Roman, serif" font-size="10" font-weight="bold" fill="white">FCI</text>
  <text x="100" y="365" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" fill="white">Tightening</text>
  
  <!-- Arrow to Finance-dependent -->
  <line x1="140" y1="345" x2="195" y2="345" stroke="#c0392b" stroke-width="2" marker-end="url(#arrowhead-red)"/>
  <text x="167" y="338" text-anchor="middle" font-family="Times New Roman, serif" font-size="8" fill="#c0392b">Strong</text>
  
  <!-- Arrow to Agriculture (crossed out) -->
  <line x1="140" y1="365" x2="195" y2="410" stroke="#95a5a6" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="150" y="400" font-family="Times New Roman, serif" font-size="14" fill="#c0392b">✗</text>
  <text x="175" y="395" font-family="Times New Roman, serif" font-size="8" fill="#7f8c8d">No detectable link</text>
  
  <!-- Finance-dependent sectors box -->
  <rect x="200" y="325" width="180" height="75" rx="4" fill="#9b59b6" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="290" y="345" text-anchor="middle" font-family="Times New Roman, serif" font-size="10" font-weight="bold" fill="white">Finance-Dependent (Y^F)</text>
  <text x="290" y="360" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" fill="white">ω_F ≈ 55% of GDP</text>
  <line x1="215" y1="368" x2="365" y2="368" stroke="white" stroke-width="0.5"/>
  <text x="290" y="382" text-anchor="middle" font-family="Times New Roman, serif" font-size="8" fill="white">Investment: −8.33 pp</text>
  <text x="290" y="393" text-anchor="middle" font-family="Times New Roman, serif" font-size="8" fill="white">Construction: −5.84 pp</text>
  
  <!-- Agriculture box -->
  <rect x="200" y="410" width="180" height="55" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="1.5"/>
  <text x="290" y="430" text-anchor="middle" font-family="Times New Roman, serif" font-size="10" font-weight="bold" fill="white">Agriculture (Y^A)</text>
  <text x="290" y="445" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" fill="white">ω_A ≈ 10% of GDP</text>
  <text x="290" y="458" text-anchor="middle" font-family="Times New Roman, serif" font-size="8" fill="white">Effect: ≈ 0 (n.s.)</text>
  
  <!-- Arrows to Aggregate -->
  <line x1="380" y1="362" x2="445" y2="390" stroke="#8e44ad" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="380" y1="437" x2="445" y2="410" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  
  <!-- Aggregate GDP box -->
  <rect x="450" y="375" width="130" height="50" rx="4" fill="#34495e" stroke="#2c3e50" stroke-width="1.5"/>
  <text x="515" y="395" text-anchor="middle" font-family="Times New Roman, serif" font-size="10" font-weight="bold" fill="white">Aggregate GDP (Y)</text>
  <text x="515" y="412" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" fill="white">Effect: −2.00 pp</text>
  
  <!-- Explanation arrow and box -->
  <line x1="580" y1="400" x2="620" y2="400" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <rect x="625" y="340" width="145" height="120" rx="4" fill="#fff9e6" stroke="#f39c12" stroke-width="1.5"/>
  <text x="697" y="358" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" font-weight="bold" fill="#8B7000">Aggregation Arithmetic:</text>
  <text x="697" y="378" text-anchor="middle" font-family="Times New Roman, serif" font-size="9" font-style="italic" fill="#2c3e50">Y = ω_A·Y^A + ω_F·Y^F</text>
  <line x1="640" y1="388" x2="755" y2="388" stroke="#f39c12" stroke-width="0.5"/>
  <text x="697" y="405" text-anchor="middle" font-family="Times New Roman, serif" font-size="8" fill="#2c3e50">∂Y/∂FCI = ω_F·(∂Y^F/∂FCI)</text>
  <text x="697" y="420" text-anchor="middle" font-family="Times New Roman, serif" font-size="8" fill="#2c3e50">= 0.55 × (−4 pp)</text>
  <text x="697" y="435" text-anchor="middle" font-family="Times New Roman, serif" font-size="8" font-weight="bold" fill="#2c3e50">≈ −2.2 pp ✓</text>
  <text x="697" y="452" text-anchor="middle" font-family="Times New Roman, serif" font-size="7" font-style="italic" fill="#7f8c8d">Weak aggregate = composition,</text>
  <text x="697" y="462" text-anchor="middle" font-family="Times New Roman, serif" font-size="7" font-style="italic" fill="#7f8c8d">not measurement failure</text>
  
  <!-- Source note -->
  <text x="400" y="510" text-anchor="middle" font-family="Times New Roman, serif" font-size="8" font-style="italic" fill="#7f8c8d">Note: Numerical estimates are illustrative, based on empirical results in Section 5. ToT = Terms of Trade; pp = percentage points.</text>
</svg>
